<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List</title>
 
  <!-- Google Fonts: Clash Display (heading) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
 
  <style>
    /* ─── CSS Variables ──────────────────────────────────────────── */
    /* Define reusable colors/sizes — change here, updates everywhere */
    :root {
      --bg:        #0f0f13;      /* dark page background             */
      --surface:   #1a1a24;      /* card/panel background            */
      --border:    #2e2e40;      /* subtle border color              */
      --accent:    #7c6aff;      /* purple accent (buttons, focus)   */
      --accent2:   #ff6a9b;      /* pink accent (delete, done line)  */
      --text:      #f0eeff;      /* main text                        */
      --muted:     #7a7a9a;      /* secondary/placeholder text       */
      --done-text: #3d3d55;      /* struck-through done task text    */
      --radius:    14px;         /* rounded corners                  */
      --font:      'DM Sans', sans-serif;
    }
 
    /* ─── Reset ──────────────────────────────────────────────────── */
    /* Remove browser default margin/padding, use border-box sizing   */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    /* ─── Body ───────────────────────────────────────────────────── */
    /* Center everything vertically & horizontally on the page        */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;                      /* full viewport height  */
      display: flex;
      align-items: center;                    /* vertical center       */
      justify-content: center;               /* horizontal center     */
      padding: 2rem;
    }
 
    /* ─── Subtle background grid texture ────────────────────────── */
    body::before {
      content: '';
      position: fixed;                         /* stays behind everything */
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;             /* grid cell size         */
      opacity: 0.15;
      pointer-events: none;                   /* don't block clicks     */
      z-index: 0;
    }
 
    /* ─── Main card container ────────────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;                             /* sits above bg grid     */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;                       /* cap width on large screens */
      box-shadow: 0 0 80px rgba(124,106,255,0.08); /* soft glow          */
    }
 
    /* ─── App header ─────────────────────────────────────────────── */
    .header {
      margin-bottom: 2rem;
    }
 
    /* Small label above the title */
    .header-label {
      font-size: 11px;
      letter-spacing: 0.12em;               /* spaced-out caps style  */
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
 
    /* Big heading */
    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }
 
    /* Stats row: "3 tasks · 1 done" */
    .stats {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }
 
    .stats span {             /* highlight the numbers */
      color: var(--text);
      font-weight: 500;
    }
 
    /* ─── Progress bar ───────────────────────────────────────────── */
    .progress-wrap {
      margin-bottom: 1.75rem;
    }
 
    /* The grey track behind the bar */
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
 
    /* The coloured fill — width set by JS via style attribute */
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;           /* smooth animation       */
    }
 
    /* ─── Input row ──────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
 
    /* Text input */
    .input-row input {
      flex: 1;                               /* take all remaining space */
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 1rem;
      height: 48px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
 
    /* Highlight border on focus */
    .input-row input:focus {
      border-color: var(--accent);
    }
 
    .input-row input::placeholder {
      color: var(--muted);
    }
 
    /* Add button */
    .btn-add {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      flex-shrink: 0;                        /* don't shrink on small screens */
    }
 
    .btn-add:hover  { background: #9580ff; }
    .btn-add:active { transform: scale(0.92); }
 
    /* ─── Filter buttons ─────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
    }
 
    .filter-btn {
      padding: 5px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
 
    /* Active filter gets accent background */
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
 
    /* ─── Task list ──────────────────────────────────────────────── */
    #taskList {
      list-style: none;                     /* remove bullet points   */
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }
 
    /* ─── Individual task item ───────────────────────────────────── */
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.22s ease;        /* entry animation        */
    }
 
    /* Fade in + slide up when task is added */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
 
    .task-item:hover {
      border-color: var(--accent);
    }
 
    /* Done state — fades the whole item */
    .task-item.done {
      opacity: 0.5;
    }
 
    /* ─── Custom checkbox ────────────────────────────────────────── */
    /* Hide native checkbox, use a styled div instead */
    .task-check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      background: transparent;
    }
 
    /* Checked state — filled accent color with checkmark */
    .task-check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
 
    /* The SVG checkmark inside */
    .task-check svg {
      width: 11px;
      height: 11px;
      stroke: #fff;
      opacity: 0;                           /* hidden when unchecked  */
      transition: opacity 0.15s;
    }
 
    .task-check.checked svg {
      opacity: 1;                           /* visible when checked   */
    }
 
    /* ─── Task text ──────────────────────────────────────────────── */
    .task-text {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      transition: color 0.2s;
    }
 
    /* Strike through when done */
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-text);
    }
 
    /* ─── Delete button ──────────────────────────────────────────── */
    .btn-del {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;                           /* hidden until hover     */
      transition: all 0.15s;
    }
 
    /* Show delete button when hovering the task row */
    .task-item:hover .btn-del {
      opacity: 1;
    }
 
    .btn-del:hover {
      background: rgba(255,106,155,0.15);
      color: var(--accent2);               /* pink on hover          */
    }
 
    /* ─── Empty state ────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 2rem 0;
      color: var(--muted);
      font-size: 13px;
      display: none;                        /* hidden when tasks exist */
    }
 
    .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
 
    /* ─── Footer: clear completed ────────────────────────────────── */
    .footer {
      margin-top: 1.25rem;
      display: flex;
      justify-content: flex-end;
    }
 
    .btn-clear {
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }
 
    .btn-clear:hover { color: var(--accent2); }
  </style>
</head>
 
<body>
 
  <!-- ── Main app card ─────────────────────────────────────────── -->
  <div class="app">
 
    <!-- Header -->
    <div class="header">
      <p class="header-label">Your workspace</p>
      <h1>To-Do List</h1>
      <!-- Stats updated by JS -->
      <p class="stats" id="stats">
        <span id="totalCount">0</span> tasks &nbsp;·&nbsp;
        <span id="doneCount">0</span> done
      </p>
    </div>
 
    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-track">
        <!-- Width % set by JS -->
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
 
    <!-- Input row: text field + add button -->
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="What needs to be done?" />
      <button class="btn-add" id="addBtn" title="Add task">+</button>
    </div>
 
    <!-- Filter buttons -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Done</button>
    </div>
 
    <!-- Task list: <li> items injected by JS -->
    <ul id="taskList"></ul>
 
    <!-- Empty state message -->
    <div class="empty" id="emptyState">
      <div class="empty-icon">✓</div>
      <p>No tasks here. Add one above!</p>
    </div>
 
    <!-- Footer -->
    <div class="footer">
      <button class="btn-clear" id="clearBtn">Clear completed</button>
    </div>
 
  </div><!-- end .app -->
 
 
  <script>
    // ─── 1. Grab DOM elements we'll use repeatedly ─────────────────
    // Store references once so we don't query the DOM on every event
    const taskInput   = document.getElementById('taskInput');
    const addBtn      = document.getElementById('addBtn');
    const taskList    = document.getElementById('taskList');
    const emptyState  = document.getElementById('emptyState');
    const progressFill= document.getElementById('progressFill');
    const totalCount  = document.getElementById('totalCount');
    const doneCount   = document.getElementById('doneCount');
    const clearBtn    = document.getElementById('clearBtn');
    const filterBtns  = document.querySelectorAll('.filter-btn');
 
    // ─── 2. State ───────────────────────────────────────────────────
    // Single source of truth: an array of task objects
    // Each task: { id, text, done }
    let tasks = [];
    let activeFilter = 'all';  // tracks which filter button is active
 
    // ─── 3. Load from localStorage on startup ──────────────────────
    // JSON.parse converts the stored string back into a JS array
    // The "|| '[]'" fallback means: if nothing stored, use empty array
    function loadFromStorage() {
      const saved = localStorage.getItem('todo-tasks');
      tasks = saved ? JSON.parse(saved) : [];
    }
 
    // ─── 4. Save to localStorage ────────────────────────────────────
    // JSON.stringify converts our JS array into a string for storage
    // Called every time tasks change
    function saveToStorage() {
      localStorage.setItem('todo-tasks', JSON.stringify(tasks));
    }
 
    // ─── 5. Add a new task ──────────────────────────────────────────
    function addTask() {
      const text = taskInput.value.trim(); // .trim() removes extra spaces
      if (!text) return;                   // ignore empty input
 
      // Create a new task object with a unique ID using Date.now()
      // Date.now() returns milliseconds since 1970 — always unique
      const task = {
        id:   Date.now(),
        text: text,
        done: false
      };
 
      tasks.push(task);    // add to our array
      saveToStorage();     // persist to localStorage
      taskInput.value = '';// clear the input field
      renderTasks();       // re-draw the list
    }
 
    // ─── 6. Toggle done/undone ──────────────────────────────────────
    // Find task by id, flip its .done boolean, save, re-render
    function toggleTask(id) {
      const task = tasks.find(t => t.id === id); // Array.find() returns first match
      if (task) task.done = !task.done;           // ! flips true↔false
      saveToStorage();
      renderTasks();
    }
 
    // ─── 7. Delete a task ───────────────────────────────────────────
    // Array.filter() returns a NEW array without the deleted task
    // We reassign tasks to this new array
    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      saveToStorage();
      renderTasks();
    }
 
    // ─── 8. Clear all completed tasks ───────────────────────────────
    function clearCompleted() {
      tasks = tasks.filter(t => !t.done); // keep only undone tasks
      saveToStorage();
      renderTasks();
    }
 
    // ─── 9. Build a single task <li> element ────────────────────────
    // Called for each task in renderTasks()
    function createTaskEl(task) {
      // Create the <li> wrapper
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      // data-id stores the task id on the element for event handlers
      li.dataset.id = task.id;
 
      // Custom checkbox div
      const check = document.createElement('div');
      check.className = 'task-check' + (task.done ? ' checked' : '');
      // SVG checkmark icon inside the checkbox
      check.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2,6 5,9 10,3"/>
      </svg>`;
      // Click checkbox → toggle done
      check.addEventListener('click', () => toggleTask(task.id));
 
      // Task text span
      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = task.text; // .textContent is safe (no XSS risk unlike innerHTML)
 
      // Delete button
      const del = document.createElement('button');
      del.className = 'btn-del';
      del.title = 'Delete task';
      del.innerHTML = '×';  // × is the × character
      del.addEventListener('click', () => deleteTask(task.id));
 
      // Assemble: append checkbox, text, delete button into <li>
      li.append(check, span, del);
      return li;
    }
 
    // ─── 10. Render all tasks ────────────────────────────────────────
    // Clears the list then re-draws from the tasks array
    // Applying filter so only matching tasks are shown
    function renderTasks() {
      taskList.innerHTML = ''; // clear current DOM list
 
      // Filter the array based on active tab
      const visible = tasks.filter(t => {
        if (activeFilter === 'active') return !t.done;
        if (activeFilter === 'done')   return t.done;
        return true; // 'all' — show everything
      });
 
      // Build and append each task element
      visible.forEach(task => {
        taskList.appendChild(createTaskEl(task));
      });
 
      updateStats();   // refresh numbers
      updateEmpty();   // show/hide empty state
    }
 
    // ─── 11. Update stats bar and progress ──────────────────────────
    function updateStats() {
      const total = tasks.length;
      const done  = tasks.filter(t => t.done).length;
 
      totalCount.textContent = total;
      doneCount.textContent  = done;
 
      // Progress % = done / total * 100 (or 0 if no tasks)
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressFill.style.width = pct + '%';
    }
 
    // ─── 12. Show/hide the empty state message ───────────────────────
    function updateEmpty() {
      // If no tasks in the list, show "No tasks here!"
      const hasItems = taskList.children.length > 0;
      emptyState.style.display = hasItems ? 'none' : 'block';
    }
 
    // ─── 13. Event: Add button click ─────────────────────────────────
    addBtn.addEventListener('click', addTask);
 
    // ─── 14. Event: Press Enter key in the input ─────────────────────
    // e.key === 'Enter' lets user add tasks without clicking
    taskInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
 
    // ─── 15. Event: Filter buttons ───────────────────────────────────
    // Loop through all filter buttons and listen for clicks
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        // Remove 'active' from all buttons
        filterBtns.forEach(b => b.classList.remove('active'));
        // Add 'active' to the one that was clicked
        btn.classList.add('active');
        // Update state and re-render
        activeFilter = btn.dataset.filter; // reads data-filter="all/active/done"
        renderTasks();
      });
    });
 
    // ─── 16. Event: Clear completed button ───────────────────────────
    clearBtn.addEventListener('click', clearCompleted);
 
    // ─── 17. Init: load stored tasks and render ───────────────────────
    loadFromStorage();
    renderTasks();
  </script>
 
</body>
</html>
